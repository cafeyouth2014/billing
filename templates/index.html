<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Youth Mobile</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        .header { background: #3C3489; color: white; padding: 15px; text-align: center; position: sticky; top: 0; }
        .section { padding: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .item-card { background: white; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; }
        .cart { background: #fff; padding: 15px; border-top: 2px solid #3C3489; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        button { background: #3C3489; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px;}
        .report-btn { background: #FAC775; color: black; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Cafe Youth</h1>
        <button class="report-btn" onclick="loadReports()">View Today's Sale</button>
    </div>

    <div class="section">
        <input type="text" id="search" placeholder="Search Menu..." onkeyup="filterMenu()">
        <div id="menu-list"></div>
    </div>

    <div style="height: 200px;"></div> <!-- Space for cart -->

    <div class="cart">
        <strong>Current Order:</strong>
        <div id="cart-content" style="max-height: 80px; overflow-y: auto; font-size: 14px;"></div>
        <div id="total-price" style="font-weight: bold; margin: 5px 0;">Total: ₹0</div>
        <button onclick="confirmOrder()" style="background: green;">CONFIRM ORDER</button>
    </div>

    <script>
        let fullMenu = [];
        let cart = [];

        // Load menu from PC
        fetch('/api/menu').then(res => res.json()).then(data => {
            fullMenu = data;
            renderMenu(data);
        });

        function renderMenu(items) {
            const list = document.getElementById('menu-list');
            list.innerHTML = items.map(item => `
                <div class="item-card" onclick="addToCart('${item.name}', ${item.price})">
                    <span>${item.name}</span>
                    <b>₹${item.price} +</b>
                </div>
            `).join('');
        }

        function filterMenu() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = fullMenu.filter(i => i.name.toLowerCase().includes(term));
            renderMenu(filtered);
        }

        function addToCart(name, price) {
            cart.push({name, price, qty: 1, total: price});
            updateCartUI();
        }

        function updateCartUI() {
            const content = document.getElementById('cart-content');
            content.innerHTML = cart.map(i => `<div>${i.name} - ₹${i.total}</div>`).join('');
            const total = cart.reduce((sum, i) => sum + i.total, 0);
            document.getElementById('total-price').innerText = "Total: ₹" + total;
        }

        function confirmOrder() {
            if(cart.length == 0) return;
            fetch('/api/save_order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(cart)
            }).then(() => {
                alert("Order Saved Successfully!");
                cart = [];
                updateCartUI();
            });
        }

        function loadReports() {
            fetch('/api/reports').then(res => res.json()).then(data => {
                alert("Today's Total Sale: ₹" + data.today_total);
            });
        }
    </script>
</body>
</html>
